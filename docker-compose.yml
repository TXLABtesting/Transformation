services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: transformation
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portal -d transformation']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # All runtime configuration comes from the .env file IT fills in
    # (copy .env.example → .env). DATABASE_URL is overridden here to point at
    # the compose "db" service instead of localhost.
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_DATA_MODE: api
      DATABASE_URL: postgresql://portal:portal@db:5432/transformation?schema=public
    ports:
      - '3000:3000'
    # Apply the versioned migrations (0001→0007), seed reference data, then
    # start the server. `migrate deploy` is idempotent and safe to re-run.
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts && npm run start"

volumes:
  pgdata:
